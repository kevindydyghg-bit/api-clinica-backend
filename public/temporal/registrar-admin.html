<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Administrador</title>
    <link rel="stylesheet" href="/estilos.css">
</head>
<body class="fondo-blanco">
    
    <header>
        <h1>Nuevo Usuario Administrador</h1>
    </header>

    <main>
        <section class="card">
            <h2>Datos del Nuevo Usuario</h2>
            <p>Este usuario tendrá acceso completo al panel de control.</p>

            <form id="registro-admin-form">
                <div>
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" required placeholder="ejemplo@clinica.com">
                </div>
                <div>
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
                </div>
                
                <button type="submit" id="btn-guardar">Registrar Usuario</button>
            </form>
            
            <p id="mensaje-respuesta" style="text-align: center; font-weight: bold; margin-top: 15px;"></p>
        </section>
    </main>

    <script src="/admin/registrar-admin.js"></script>
</body>
</html>
